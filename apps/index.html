<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Optics Lab: Lenses Converging & Diverging</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; }
        canvas { background: white; border: 1px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .controls { width: 800px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ccc; }
        .slider-row { display: flex; justify-content: space-around; gap: 20px; margin-top: 15px; }
        .slider-group { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .toggle-group { margin-bottom: 10px; display: flex; gap: 20px; font-weight: bold; }
        input[type="range"] { width: 100%; }
        .stats { display: flex; justify-content: space-between; font-family: monospace; background: #eee; padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<canvas id="opticsCanvas" width="800" height="400"></canvas>

<div class="controls">
    <div class="toggle-group">
        <label><input type="radio" name="lensType" value="converging" checked onchange="update()"> Converging (Convex)</label>
        <label><input type="radio" name="lensType" value="diverging" onchange="update()"> Diverging (Concave)</label>
    </div>

    <div class="stats">
        <span>p: <span id="out-p"></span>cm</span>
        <span>ho: <span id="out-ho"></span>cm</span>
        <span>f: <span id="out-f"></span>cm</span>
        <span>q: <span id="out-q"></span>cm</span>
        <span>hi: <span id="out-hi"></span>cm</span>
        <span id="case-label" style="font-weight:bold; color:#d9534f;"></span>
    </div>

    <div class="slider-row">
        <div class="slider-group">
            <label>Object Distance (p)</label>
            <input type="range" id="slide-p" min="10" max="150" value="75">
        </div>
        <div class="slider-group">
            <label>Focal Length (|f|)</label>
            <input type="range" id="slide-f" min="5" max="50" value="25">
        </div>
        <div class="slider-group">
            <label>Object Height (ho)</label>
            <input type="range" id="slide-ho" min="5" max="40" value="20">
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('opticsCanvas');
const ctx = canvas.getContext('2d');
const centerX = 400;
const centerY = 200;
const scale = 4;

function update() {
    const p = parseFloat(document.getElementById('slide-p').value);
    const ho = parseFloat(document.getElementById('slide-ho').value);
    let fInput = parseFloat(document.getElementById('slide-f').value);
    
    const isDiverging = document.querySelector('input[name="lensType"]:checked').value === 'diverging';
    const f = isDiverging ? -fInput : fInput;

    const denom = (1/f) - (1/p);
    let q, hi, isInfinite = false;

    if (Math.abs(denom) < 0.001) {
        isInfinite = true;
        q = 9999; 
        hi = -ho;
    } else {
        q = 1 / denom;
        hi = -(q / p) * ho;
    }

    // Update Stats Bar
    document.getElementById('out-p').innerText = p;
    document.getElementById('out-ho').innerText = ho;
    document.getElementById('out-f').innerText = Math.abs(f);
    document.getElementById('out-q').innerText = isInfinite ? "∞" : q.toFixed(1);
    document.getElementById('out-hi').innerText = isInfinite ? "∞" : hi.toFixed(1);
    
    const label = document.getElementById('case-label');
    if (isDiverging) label.innerText = "DIVERGING: VIRTUAL & DIMINISHED";
    else if (isInfinite) label.innerText = "CASE 5: AT FOCUS";
    else if (p < f) label.innerText = "CASE 6: WITHIN f (VIRTUAL)";
    else label.innerText = "CONVERGING: REAL IMAGE";

    const pxS = centerX - (p * scale);
    const pyS = centerY - (ho * scale);
    const qxS = centerX + (q * scale);
    const qyS = centerY - (hi * scale);

    draw(f, ho, q, hi, isInfinite, pxS, pyS, qxS, qyS, isDiverging);
}

function draw(f, ho, q, hi, isInfinite, pxS, pyS, qxS, qyS, isDiverging) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const absF = Math.abs(f);

    // Title
    ctx.fillStyle = "black";
    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(isDiverging ? "Diverging Lens" : "Converging Lens", centerX, 40);

    // Axis and Lens
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(800, centerY); ctx.stroke();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(centerX, 50); ctx.lineTo(centerX, 350); ctx.stroke();
    
    // Lens glyphs
    ctx.beginPath();
    if (isDiverging) {
        ctx.moveTo(centerX-10, 50); ctx.lineTo(centerX, 65); ctx.lineTo(centerX+10, 50);
        ctx.moveTo(centerX-10, 350); ctx.lineTo(centerX, 335); ctx.lineTo(centerX+10, 350);
    } else {
        ctx.moveTo(centerX-10, 65); ctx.lineTo(centerX, 50); ctx.lineTo(centerX+10, 65);
        ctx.moveTo(centerX-10, 335); ctx.lineTo(centerX, 350); ctx.lineTo(centerX+10, 335);
    }
    ctx.stroke();

    // Points
    const points = [
        { x: centerX - absF*scale, label: isDiverging ? "F'" : "F" },
        { x: centerX + absF*scale, label: isDiverging ? "F" : "F'" }
    ];
    points.forEach(pt => {
        ctx.fillStyle = "black";
        ctx.beginPath(); ctx.arc(pt.x, centerY, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillText(pt.label, pt.x, centerY + 20);
    });

    drawArrow(pxS, centerY, ho * scale, 'black'); // Object

    if (isInfinite) {
        drawParallelRays(pxS, pyS, absF);
    } else {
        const isVirtual = q < 0;
        if (isDiverging) {
            drawDivergingRays(pxS, pyS, qxS, qyS, absF);
        } else {
            drawConvergingRays(pxS, pyS, qxS, qyS, isVirtual);
        }
        
        drawArrow(qxS, centerY, hi * scale, isVirtual ? '#f1c40f' : 'blue');
    }
}

function drawConvergingRays(pxS, pyS, qxS, qyS, isVirtual) {
    ctx.lineWidth = 1.2;
    // Red
    ctx.strokeStyle = 'red';
    ctx.beginPath(); ctx.moveTo(pxS, pyS); ctx.lineTo(centerX, pyS);
    let rS = (qyS - pyS) / (qxS - centerX);
    ctx.lineTo(800, pyS + (800 - centerX) * rS); ctx.stroke();
    // Blue
    ctx.strokeStyle = 'blue';
    ctx.beginPath(); ctx.moveTo(pxS, pyS);
    let bS = (centerY - pyS) / (centerX - pxS);
    ctx.lineTo(800, centerY + (800 - centerX) * bS); ctx.stroke();
    // Green
    ctx.strokeStyle = 'green';
    ctx.beginPath(); ctx.moveTo(pxS, pyS); ctx.lineTo(centerX, qyS); ctx.lineTo(800, qyS); ctx.stroke();

    if (isVirtual) {
        ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.moveTo(centerX, pyS); ctx.lineTo(qxS, qyS);
        ctx.moveTo(centerX, centerY); ctx.lineTo(qxS, qyS);
        ctx.moveTo(centerX, qyS); ctx.lineTo(qxS, qyS);
        ctx.stroke(); ctx.setLineDash([]);
    }
}

function drawDivergingRays(pxS, pyS, qxS, qyS, fS) {
    const fFront = centerX - fS * scale;
    // Red: Parallel -> Bends away from front focus
    ctx.strokeStyle = 'red';
    ctx.beginPath(); ctx.moveTo(pxS, pyS); ctx.lineTo(centerX, pyS);
    const redSlope = (pyS - centerY) / (centerX - fFront);
    ctx.lineTo(800, pyS + (800 - centerX) * redSlope); ctx.stroke();
    // Green: Aimed at back focus -> Parallel
    ctx.strokeStyle = 'green';
    ctx.beginPath(); ctx.moveTo(pxS, pyS); ctx.lineTo(centerX, qyS); ctx.lineTo(800, qyS); ctx.stroke();
    // Blue: Center
    ctx.strokeStyle = 'blue';
    ctx.beginPath(); ctx.moveTo(pxS, pyS);
    ctx.lineTo(800, centerY + (800 - centerX) * ((centerY - pyS) / (centerX - pxS))); ctx.stroke();
    // Back Projections
    ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.moveTo(centerX, pyS); ctx.lineTo(qxS, qyS);
    ctx.moveTo(centerX, qyS); ctx.lineTo(qxS, qyS);
    ctx.moveTo(centerX, centerY); ctx.lineTo(qxS, qyS);
    ctx.stroke(); ctx.setLineDash([]);
}

function drawParallelRays(pxS, pyS, fS) {
    const fBack = centerX + fS * scale;
    const slope = (centerY - pyS) / (centerX - pxS);
    ctx.strokeStyle = 'red';
    ctx.beginPath(); ctx.moveTo(pxS, pyS); ctx.lineTo(centerX, pyS); ctx.lineTo(800, pyS + (800-centerX)* ((centerY-pyS)/(fBack-centerX)) ); ctx.stroke();
    ctx.strokeStyle = 'blue';
    ctx.beginPath(); ctx.moveTo(pxS, pyS); ctx.lineTo(800, centerY + (800-centerX)*slope); ctx.stroke();
}

function drawArrow(x, y, h, color) {
    if (isNaN(x) || Math.abs(x) > 5000) return;
    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - h); ctx.stroke();
    const head = 10; const dir = h > 0 ? 1 : -1;
    ctx.beginPath(); ctx.moveTo(x-6, y-h+head*dir); ctx.lineTo(x, y-h); ctx.lineTo(x+6, y-h+head*dir); ctx.fill();
}

document.querySelectorAll('input').forEach(input => input.addEventListener('input', update));
update();
</script>
</body>
</html>
