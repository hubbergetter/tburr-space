<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graphing Calculator v5 (v4 + TI-84 Intersection)</title>

<style>
  body {
    font-family: monospace;
    padding: 20px;
  }

  .container {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  canvas {
    border: 1px solid black;
  }

  .controls {
    width: 240px;
  }

  .equation-box {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .equation-label {
    white-space: nowrap;
    width: 40px;
  }

  .equation-box input[type="text"] {
    flex: 1;
    font-family: monospace;
  }

  summary {
    cursor: pointer;
    user-select: none;
    font-weight: bold;
  }

  .window-table {
    border-collapse: collapse;
    margin-top: 6px;
  }

  .window-table td {
    padding: 2px 6px;
  }

  .window-table input {
    width: 90px;
    font-family: monospace;
  }

  button {
    margin-top: 10px;
    width: 100%;
    font-family: monospace;
    padding: 6px;
  }

  .modeButton.active {
    background: black;
    color: white;
  }

  .status {
    margin-top: 10px;
    padding: 6px;
    border: 1px solid #aaa;
    min-height: 52px;
    white-space: pre-line;
  }
</style>
</head>

<body>

<div class="container">

  <canvas id="graph" width="400" height="400" tabindex="0"></canvas>

  <div class="controls">

    <!-- Equations -->
    <div class="equation-box">
      <input type="checkbox" id="chk1" checked>
      <span class="equation-label">y₁ =</span>
      <input id="equation1" value="sin(x)">
    </div>

    <div class="equation-box">
      <input type="checkbox" id="chk2" checked>
      <span class="equation-label">y₂ =</span>
      <input id="equation2" value="cos(x)">
    </div>

    <!-- Window -->
    <details open>
      <summary>Window</summary>
      <table class="window-table">
        <tr><td>xMin</td><td><input id="xMin" value="-2*pi"></td></tr>
        <tr><td>xMax</td><td><input id="xMax" value="2*pi"></td></tr>
        <tr><td>xScl</td><td><input id="xScl" value="pi/2"></td></tr>

        <tr><td>yMin</td><td><input id="yMin" value="-2"></td></tr>
        <tr><td>yMax</td><td><input id="yMax" value="2"></td></tr>
        <tr><td>yScl</td><td><input id="yScl" value="1"></td></tr>
      </table>
    </details>

    <button onclick="regraph()">Regraph</button>

    <button id="traceBtn" class="modeButton active" onclick="setMode('trace')">Trace Mode</button>
    <button id="intersectBtn" class="modeButton" onclick="setMode('intersect')">Intersection Mode</button>

    <button onclick="saveState()">Save (State)</button>
    <button onclick="clearState()">Clear State</button>

    <button onclick="exportPNG()">Export PNG</button>

    <div id="status" class="status"></div>

  </div>
</div>

<script>
/* =====================================================
   Setup (v4 foundation)
===================================================== */
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d", { willReadFrequently: true });

canvas.addEventListener("click", () => {
  canvas.focus();
});

// remembers last mouse position on canvas
let lastTracePx = null;   


let currentWindow = null;
let graphImage = null;

// Trace uses ONE selected function (like v4), chosen by checkboxes
let currentFunction = null;

// Two functions for graphing/intersection
let f1 = null;
let f2 = null;

/* =====================================================
   DOM references
===================================================== */
const xMinEl = document.getElementById("xMin");
const xMaxEl = document.getElementById("xMax");
const yMinEl = document.getElementById("yMin");
const yMaxEl = document.getElementById("yMax");
const xSclEl = document.getElementById("xScl");
const ySclEl = document.getElementById("yScl");

const chk1El = document.getElementById("chk1");
const chk2El = document.getElementById("chk2");

const eq1El = document.getElementById("equation1");
const eq2El = document.getElementById("equation2");

const statusEl = document.getElementById("status");

chk1El.addEventListener("change", regraph);
chk2El.addEventListener("change", regraph);


/* =====================================================
   Mode + TI-84 Intersection State (ADD-ON BLOCK)
===================================================== */
let mode = "trace";

// TI-84 stages: 0 off, 1 pick left, 2 pick right, 3 solve
let intersectStage = 0;
let markerX = null;
let xLeft = null;
let xRight = null;
let traceIndex = 1; // 1 = y1, 2 = y2


function updateTraceFunction() {

  // If tracing y1 but y1 is OFF, switch to y2
  if (traceIndex === 1 && (!chk1El.checked || !f1)) {
    traceIndex = 2;
  }

  // If tracing y2 but y2 is OFF, switch to y1
  if (traceIndex === 2 && (!chk2El.checked || !f2)) {
    traceIndex = 1;
  }

  // Assign currentFunction based on traceIndex
  if (traceIndex === 1 && chk1El.checked && f1) {
    currentFunction = f1;
    return;
  }

  if (traceIndex === 2 && chk2El.checked && f2) {
    currentFunction = f2;
    return;
  }

  // If neither is available, trace nothing
  currentFunction = null;
}



function setStatus(msg) {
  statusEl.textContent = msg;
}

function setMode(newMode) {

  if (mode === newMode) return;

  mode = newMode;

  document.getElementById("traceBtn").classList.remove("active");
  document.getElementById("intersectBtn").classList.remove("active");

  /* ===============================
     TRACE MODE
  =============================== */
  if (mode === "trace") {

    document.getElementById("traceBtn").classList.add("active");

    // Ensure graph + functions are ready
    regraph();

    // Select correct trace function
    updateTraceFunction();

    setStatus("Trace Mode:\nClick the graph, then press ↑ ↓ to switch curves.");
    return;
  }

  /* ===============================
     INTERSECTION MODE
  =============================== */
  if (mode === "intersect") {

    document.getElementById("intersectBtn").classList.add("active");

    // Must have a graph snapshot first
    if (!currentWindow || !graphImage) {
      setStatus("Intersection Mode:\nClick Regraph first.");
      return;
    }

    // Start boundary selection
    intersectStage = 1;
    markerX = (currentWindow.xMin + currentWindow.xMax) / 2;

    setStatus(
      "Intersection Mode (TI-84 style)\n" +
      "Step 1: Move marker LEFT of intersection (← →)\n" +
      "Press ENTER to set Left Boundary."
    );

    drawMarker(markerX, "red");
    return;
  }
}


/* =====================================================
   Calculator-style preprocessing (v4)
===================================================== */
function preprocess(expr) {
  return expr
    .replace(/\^/g, "**")
    .replace(/\bln\b/g, "Math.log")
    .replace(/\blog\b/g, "Math.log10")
    .replace(/\bsin\b/g, "Math.sin")
    .replace(/\bcos\b/g, "Math.cos")
    .replace(/\btan\b/g, "Math.tan")
    .replace(/\bsqrt\b/g, "Math.sqrt")
    .replace(/\bexp\b/g, "Math.exp")
    .replace(/\bpi\b/g, "Math.PI")
    .replace(/\be\b/g, "Math.E");
}

/* =====================================================
   Parse window inputs (v4 stable!)
===================================================== */
function parseInput(str) {
  const cleaned = String(str)
    .toLowerCase()
    .replace(/\s+/g, "")
    .replace(/pi/g, "Math.PI");

  return Function("return (" + cleaned + ")")();
}

/* =====================================================
   Format π axis labels (v4)
===================================================== */
function formatPiLabel(x) {
  const frac = x / Math.PI;

  if (Math.abs(frac) < 1e-10) return "0";
  if (Math.abs(frac - 1) < 1e-10) return "π";
  if (Math.abs(frac + 1) < 1e-10) return "-π";

  if (Math.abs(frac - 0.5) < 1e-10) return "π/2";
  if (Math.abs(frac + 0.5) < 1e-10) return "-π/2";

  if (Math.abs(frac - 2) < 1e-10) return "2π";
  if (Math.abs(frac + 2) < 1e-10) return "-2π";

  return frac.toFixed(2) + "π";
}

/* =====================================================
   Controller (v4 + small extension)
===================================================== */
function regraph() {
  // Read window values (v4)
  const xMin = parseInput(xMinEl.value);
  const xMax = parseInput(xMaxEl.value);
  const yMin = parseInput(yMinEl.value);
  const yMax = parseInput(yMaxEl.value);
  const xScl = parseInput(xSclEl.value);
  const yScl = parseInput(ySclEl.value);

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const scaleX = canvas.width / (xMax - xMin);
  const scaleY = canvas.height / (yMax - yMin);

  currentWindow = { xMin, xMax, yMin, yMax, scaleX, scaleY };

  // Background
  drawGridPixel(xMin, xMax, yMin, yMax, xScl, yScl, scaleX, scaleY);
  drawAxesPixel(xMin, xMax, yMin, yMax, scaleX, scaleY);
  drawAxisLabelsPixel(xMin, xMax, yMin, yMax, xScl, yScl, scaleX, scaleY);

  // Compile functions fresh each time
  f1 = compileFunction(eq1El.value);
  f2 = compileFunction(eq2El.value);

  // ✅ Choose trace target using traceIndex system
  updateTraceFunction();

  // Draw only enabled graphs
  if (f1 && chk1El.checked) drawFunctionCompiled(f1, "red");
  if (f2 && chk2El.checked) drawFunctionCompiled(f2, "blue");


  
  // Snapshot
  graphImage = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // Status
  if (mode === "intersect") {
    // restart marker selection after a redraw
    intersectStage = 1;
    markerX = (currentWindow.xMin + currentWindow.xMax) / 2;
    setStatus(
      "Intersection Mode (TI-84 style)\n" +
      "Step 1: Move marker LEFT of the intersection (← →)\n" +
      "Press ENTER to set Left Boundary."
    );
    drawMarker(markerX, "red");
  } else {
    setStatus("Trace Mode:\nMove mouse over the selected graph.");
  }
}

function compileFunction(expr) {
  try {
    return new Function("x", "return " + preprocess(expr));
  } catch {
    return null;
  }
}

/* =====================================================
   Grid (v4)
===================================================== */
function drawGridPixel(xMin, xMax, yMin, yMax, xScl, yScl, scaleX, scaleY) {
  ctx.strokeStyle = "#ddd";
  ctx.lineWidth = 1;
  ctx.beginPath();

  for (let x = Math.ceil(xMin/xScl)*xScl; x <= xMax; x += xScl) {
    if (Math.abs(x) < 1e-10) continue;
    const px = (x - xMin) * scaleX;
    ctx.moveTo(px, 0);
    ctx.lineTo(px, canvas.height);
  }

  for (let y = Math.ceil(yMin/yScl)*yScl; y <= yMax; y += yScl) {
    if (Math.abs(y) < 1e-10) continue;
    const py = (yMax - y) * scaleY;
    ctx.moveTo(0, py);
    ctx.lineTo(canvas.width, py);
  }

  ctx.stroke();
}

/* =====================================================
   Axes (v4)
===================================================== */
function drawAxesPixel(xMin, xMax, yMin, yMax, scaleX, scaleY) {
  ctx.fillStyle = "#000";

  if (xMin <= 0 && xMax >= 0) {
    const x0 = (0 - xMin) * scaleX;
    ctx.fillRect(x0 - 1, 0, 2, canvas.height);
  }

  if (yMin <= 0 && yMax >= 0) {
    const y0 = (yMax - 0) * scaleY;
    ctx.fillRect(0, y0 - 1, canvas.width, 2);
  }
}

/* =====================================================
   Axis Labels (v4, but checks y1/y2 for trig)
===================================================== */
function drawAxisLabelsPixel(xMin, xMax, yMin, yMax, xScl, yScl, scaleX, scaleY) {
  ctx.fillStyle = "#000";
  ctx.font = "12px monospace";

  const isTrig =
    eq1El.value.includes("sin") || eq1El.value.includes("cos") || eq1El.value.includes("tan") ||
    eq2El.value.includes("sin") || eq2El.value.includes("cos") || eq2El.value.includes("tan");

  // X-axis labels
  if (yMin <= 0 && yMax >= 0) {
    const y0 = (yMax - 0) * scaleY;

    let lastLabelPx = -Infinity;
    const MIN_SPACING = 40;

    for (let x = Math.ceil(xMin/xScl)*xScl; x <= xMax; x += xScl) {
      if (Math.abs(x) < 1e-10) continue;

      const px = (x - xMin) * scaleX;
      if (px - lastLabelPx < MIN_SPACING) continue;

      const label = isTrig ? formatPiLabel(x) : x.toFixed(2);

      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText(label, px, y0 + 4);

      lastLabelPx = px;
    }
  }

  // Y-axis labels
  if (xMin <= 0 && xMax >= 0) {
    const x0 = (0 - xMin) * scaleX;

    let lastLabelPy = Infinity;
    const MIN_SPACING = 24;

    for (let y = Math.ceil(yMin/yScl)*yScl; y <= yMax; y += yScl) {
      if (Math.abs(y) < 1e-10) continue;

      const py = (yMax - y) * scaleY;
      if (lastLabelPy - py < MIN_SPACING) continue;

      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      ctx.fillText(y.toString(), x0 - 6, py);

      lastLabelPy = py;
    }
  }
}

/* =====================================================
   Function Plotting (v4 logic preserved)
===================================================== */
function drawFunctionCompiled(f, color) {
  const { xMin, xMax, yMax, scaleX, scaleY } = currentWindow;

  ctx.setTransform(1,0,0,1,0,0);
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;

  const step = (xMax - xMin) / canvas.width;
  let drawing = false;

  ctx.beginPath();

  for (let x = xMin; x <= xMax; x += step) {
    let y;
    try { y = f(x); }
    catch { drawing = false; continue; }

    const px = (x - xMin) * scaleX;
    const py = (yMax - y) * scaleY;

    if (!isFinite(y)) {
      drawing = false;
      continue;
    }

    if (!drawing) {
      ctx.moveTo(px, py);
      drawing = true;
    } else {
      ctx.lineTo(px, py);
    }
  }

  ctx.stroke();
}

/* =====================================================
   Save/Load State (equations + window)
===================================================== */
function saveState() {
  const state = {
    equation1: eq1El.value,
    equation2: eq2El.value,
    chk1: chk1El.checked,
    chk2: chk2El.checked,
    xMin: xMinEl.value,
    xMax: xMaxEl.value,
    xScl: xSclEl.value,
    yMin: yMinEl.value,
    yMax: yMaxEl.value,
    yScl: ySclEl.value
  };

  localStorage.setItem("savedGraph", JSON.stringify(state));
  setStatus("Saved calculator state to localStorage.");
}

function loadSavedGraph() {
  const saved = localStorage.getItem("savedGraph");
  if (!saved) return;

  const state = JSON.parse(saved);

  if (state.equation1 !== undefined) eq1El.value = state.equation1;
  if (state.equation2 !== undefined) eq2El.value = state.equation2;

  if (state.chk1 !== undefined) chk1El.checked = state.chk1;
  if (state.chk2 !== undefined) chk2El.checked = state.chk2;

  if (state.xMin !== undefined) xMinEl.value = state.xMin;
  if (state.xMax !== undefined) xMaxEl.value = state.xMax;
  if (state.xScl !== undefined) xSclEl.value = state.xScl;
  if (state.yMin !== undefined) yMinEl.value = state.yMin;
  if (state.yMax !== undefined) yMaxEl.value = state.yMax;
  if (state.yScl !== undefined) ySclEl.value = state.yScl;
}

function clearState() {
  localStorage.removeItem("savedGraph");

  // Reset to simple defaults (you can change these later)
  chk1El.checked = true;
  chk2El.checked = true;

  eq1El.value = "sin(x)";
  eq2El.value = "cos(x)";

  xMinEl.value = "-2*pi";
  xMaxEl.value = "2*pi";
  xSclEl.value = "pi/2";
  yMinEl.value = "-2";
  yMaxEl.value = "2";
  ySclEl.value = "1";

  setStatus("Cleared saved state.\nRestored defaults.");
  regraph();
}

/* =====================================================
   Export PNG (separate meaning)
===================================================== */
function exportPNG() {
  const link = document.createElement("a");
  link.download = "graph.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

/* =====================================================
  small helper that redraws the trace dot
===================================================== */
function redrawTraceAt(px) {

  if (!currentFunction || !currentWindow || !graphImage) return;

  // Convert pixel → math x
  const x = currentWindow.xMin + px / currentWindow.scaleX;

  // Evaluate selected function
  let y;
  try {
    y = currentFunction(x);
  } catch {
    return;
  }

  if (!isFinite(y)) return;

  // Convert math y → pixel y
  const py = (currentWindow.yMax - y) * currentWindow.scaleY;

  if (py < 0 || py > canvas.height) return;

  // Restore clean graph
  ctx.putImageData(graphImage, 0, 0);

  // Draw dot
  ctx.fillStyle = "blue";
  ctx.beginPath();
  ctx.arc(px, py, 5, 0, 2 * Math.PI);
  ctx.fill();

  // Draw coordinate label
  const label = `x=${x.toFixed(2)}, y=${y.toFixed(2)}`;

  ctx.font = "12px monospace";
  ctx.textAlign = "right";
  ctx.textBaseline = "bottom";

  ctx.fillStyle = "black";
  ctx.fillText(label, canvas.width - 10, canvas.height - 10);
}


/* =====================================================
   TRACE FEATURE (v4 preserved)
===================================================== */
canvas.addEventListener("mousemove", (event) => {
  if (mode !== "trace") return;
  if (!currentFunction || !currentWindow || !graphImage) return;

  const rect = canvas.getBoundingClientRect();
  const px = event.clientX - rect.left;
  lastTracePx = px;

  const x = currentWindow.xMin + px / currentWindow.scaleX;

  let y;
  try { y = currentFunction(x); }
  catch { return; }

  if (!isFinite(y)) return;

  const py = (currentWindow.yMax - y) * currentWindow.scaleY;
  if (py < 0 || py > canvas.height) return;

  ctx.putImageData(graphImage, 0, 0);

  // Dot
  ctx.fillStyle = "blue";
  ctx.beginPath();
  ctx.arc(px, py, 5, 0, 2 * Math.PI);
  ctx.fill();

  // Label
  const label = `x=${x.toFixed(2)}, y=${y.toFixed(2)}`;

  ctx.font = "12px monospace";
  ctx.textAlign = "right";
  ctx.textBaseline = "bottom";

  const margin = 10;
  const textX = canvas.width - margin;
  const textY = canvas.height - margin;

  const metrics = ctx.measureText(label);
  const boxWidth = metrics.width + 12;
  const boxHeight = 20;

  ctx.fillStyle = "white";
  ctx.fillRect(textX - boxWidth, textY - boxHeight, boxWidth, boxHeight);

  ctx.strokeStyle = "black";
  ctx.strokeRect(textX - boxWidth, textY - boxHeight, boxWidth, boxHeight);

  ctx.fillStyle = "black";
  ctx.fillText(label, textX - 6, textY - 5);
});

canvas.addEventListener("mouseleave", () => {
  if (!graphImage) return;
  ctx.putImageData(graphImage, 0, 0);
});

/* =====================================================
   INTERSECTION MODE (ADD-ON BLOCK, TI-84 style)
===================================================== */
function drawMarker(xValue, color) {
  if (!graphImage) return;

  ctx.putImageData(graphImage, 0, 0);

  const px = (xValue - currentWindow.xMin) * currentWindow.scaleX;

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(px, 0);
  ctx.lineTo(px, canvas.height);
  ctx.stroke();
}

function solveIntersection() {
  // Require both graphs enabled and valid
  if (!(chk1El.checked && chk2El.checked && f1 && f2)) {
    setStatus("Intersection requires BOTH y₁ and y₂ to be enabled and valid.");
    return;
  }

  // Ensure order
  let a = xLeft;
  let b = xRight;
  if (a > b) [a, b] = [b, a];

  function diff(x) {
    return f1(x) - f2(x);
  }

  let fa = diff(a);
  let fb = diff(b);

  if (!isFinite(fa) || !isFinite(fb)) {
    setStatus("Boundary produced invalid values.\nMove boundaries away from asymptotes.");
    return;
  }

  if (fa * fb > 0) {
    setStatus("No sign change between boundaries.\nMove boundaries so the intersection is BETWEEN them.");
    return;
  }

  // Bisection (update fa as we move a)
  for (let i = 0; i < 60; i++) {
    const mid = (a + b) / 2;
    const fm = diff(mid);

    if (!isFinite(fm)) {
      a = a + (b - a) * 0.01;
      fa = diff(a);
      continue;
    }

    if (fa * fm <= 0) {
      b = mid;
      fb = fm;
    } else {
      a = mid;
      fa = fm;
    }
  }

  const rootX = (a + b) / 2;
  let rootY;
  try { rootY = f1(rootX); } catch { rootY = NaN; }

  ctx.putImageData(graphImage, 0, 0);

  const px = (rootX - currentWindow.xMin) * currentWindow.scaleX;
  const py = (currentWindow.yMax - rootY) * currentWindow.scaleY;

  ctx.fillStyle = "purple";
  ctx.beginPath();
  ctx.arc(px, py, 6, 0, 2 * Math.PI);
  ctx.fill();

  ctx.fillStyle = "black";
  ctx.font = "12px monospace";
  ctx.fillText(`(${rootX.toFixed(4)}, ${rootY.toFixed(4)})`, px + 10, py - 10);

  // Keep the point
  graphImage = ctx.getImageData(0, 0, canvas.width, canvas.height);

  setStatus("Intersection found.\nSwitch back to Trace if you want.");
}

document.addEventListener("keydown", (e) => {
  if (mode !== "intersect") return;
  if (!currentWindow || !graphImage) return;

  const step = (currentWindow.xMax - currentWindow.xMin) / 120;

  if (e.key === "ArrowLeft") markerX = Math.max(currentWindow.xMin, markerX - step);
  if (e.key === "ArrowRight") markerX = Math.min(currentWindow.xMax, markerX + step);

  if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
    if (intersectStage === 1) drawMarker(markerX, "red");
    if (intersectStage === 2) drawMarker(markerX, "blue");
  }

  if (e.key === "Enter") {
    if (intersectStage === 1) {
      xLeft = markerX;
      markerX = Math.min(currentWindow.xMax, markerX + (currentWindow.xMax - currentWindow.xMin) / 10);
      intersectStage = 2;
      setStatus("Step 2: Move marker RIGHT of the intersection (← →)\nPress ENTER to set Right Boundary.");
      drawMarker(markerX, "blue");
      return;
    }

    if (intersectStage === 2) {
      xRight = markerX;
      intersectStage = 3;
      setStatus("Step 3: Press ENTER again to compute intersection.");
      return;
    }

    if (intersectStage === 3) {
      solveIntersection();
      intersectStage = 0;
      return;
    }
  }
});

document.addEventListener("keydown", (e) => {

  if (mode !== "trace") return;

  if (e.key === "ArrowUp" || e.key === "ArrowDown") {
    e.preventDefault();  // ✅ stops browser stealing arrow keys

    // Switch trace target
    if (traceIndex === 1 && chk2El.checked) {
      traceIndex = 2;
    }
    else if (traceIndex === 2 && chk1El.checked) {
      traceIndex = 1;
    }

    updateTraceFunction();
	// ✅ Immediately redraw dot on new curve
   if (lastTracePx !== null) {
     redrawTraceAt(lastTracePx);
}


    setStatus(
      "Trace Mode:\n" +
      (traceIndex === 1 ? "Tracing y₁ (red)" : "Tracing y₂ (blue)") +
      "\n(Press ↑ ↓ to switch curves)"
    );
  }
});


/* =====================================================
   Initial draw (v4 preserved pattern)
===================================================== */
loadSavedGraph();
regraph();
setStatus("Trace Mode:\nMove mouse over the selected graph.");
</script>

</body>
</html>
