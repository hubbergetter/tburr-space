<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Optics Lab: Spherical Mirrors</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; padding: 20px; }
        canvas { background: white; border: 1px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .controls { width: 800px; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ccc; }
        .slider-row { display: flex; justify-content: space-around; gap: 20px; margin-top: 15px; }
        .slider-group { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .toggle-group { margin-bottom: 10px; display: flex; gap: 20px; font-weight: bold; }
        input[type="range"] { width: 100%; }
        .stats { display: flex; justify-content: space-between; font-family: monospace; background: #eee; padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<canvas id="opticsCanvas" width="800" height="400"></canvas>

<div class="controls">
    <div class="toggle-group">
        <label><input type="radio" name="mirrorType" value="converging" checked onchange="update()"> Converging (Concave)</label>
        <label><input type="radio" name="mirrorType" value="diverging" onchange="update()"> Diverging (Convex)</label>
    </div>

    <div class="stats">
        <span>p: <span id="out-p"></span>cm</span>
        <span>ho: <span id="out-ho"></span>cm</span>
        <span>f: <span id="out-f"></span>cm</span>
        <span>q: <span id="out-q"></span>cm</span>
        <span>hi: <span id="out-hi"></span>cm</span>
        <span id="case-label" style="font-weight:bold; color:#d9534f;"></span>
    </div>

    <div class="slider-row">
        <div class="slider-group">
            <label>Object Distance (p)</label>
            <input type="range" id="slide-p" min="10" max="150" value="75">
        </div>
        <div class="slider-group">
            <label>Focal Length (|f|)</label>
            <input type="range" id="slide-f" min="5" max="50" value="25">
        </div>
        <div class="slider-group">
            <label>Object Height (ho)</label>
            <input type="range" id="slide-ho" min="5" max="40" value="20">
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('opticsCanvas');
const ctx = canvas.getContext('2d');
const centerX = 400; 
const centerY = 200;
const scale = 4;

function update() {
    const p = parseFloat(document.getElementById('slide-p').value);
    const ho = parseFloat(document.getElementById('slide-ho').value);
    let fInput = parseFloat(document.getElementById('slide-f').value);
    
    const isDiverging = document.querySelector('input[name="mirrorType"]:checked').value === 'diverging';
    const f = isDiverging ? -fInput : fInput;

    const denom = (1/f) - (1/p);
    let q, hi, isInfinite = false;

    if (Math.abs(denom) < 0.001) {
        isInfinite = true;
        q = 9999; hi = -ho;
    } else {
        q = 1 / denom;
        hi = -(q / p) * ho;
    }

    document.getElementById('out-p').innerText = p;
    document.getElementById('out-ho').innerText = ho;
    document.getElementById('out-f').innerText = Math.abs(f);
    document.getElementById('out-q').innerText = isInfinite ? "∞" : q.toFixed(1);
    document.getElementById('out-hi').innerText = isInfinite ? "∞" : hi.toFixed(1);
    
    const label = document.getElementById('case-label');
    if (isDiverging) label.innerText = "DIVERGING MIRROR (VIRTUAL)";
    else if (isInfinite) label.innerText = "AT FOCUS (NO IMAGE)";
    else if (p < f) label.innerText = "WITHIN f (VIRTUAL & ENLARGED)";
    else label.innerText = "CONCAVE MIRROR (REAL IMAGE)";

    const pxS = centerX - (p * scale);
    const pyS = centerY - (ho * scale);
    const qxS = centerX - (q * scale);
    const qyS = centerY - (hi * scale);

    draw(f, ho, q, hi, isInfinite, pxS, pyS, qxS, qyS, isDiverging);
}

function draw(f, ho, q, hi, isInfinite, pxS, pyS, qxS, qyS, isDiverging) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const absF = Math.abs(f);

    ctx.fillStyle = "black";
    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(isDiverging ? "Diverging (Convex) Mirror" : "Converging (Concave) Mirror", centerX, 40);

    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(800, centerY); ctx.stroke();
    
    ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(centerX, 50); ctx.lineTo(centerX, 350); ctx.stroke();
    
    // TWO GLYPHS: One top, one bottom
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (isDiverging) {
        // Convex: Bulge toward object. 
        // Glyphs point to the RIGHT (away from object)
        ctx.moveTo(centerX, 50); ctx.lineTo(centerX + 15, 65);
        ctx.moveTo(centerX, 350); ctx.lineTo(centerX + 15, 335);
    } else {
        // Concave: Caving away from object. 
        // Glyphs point to the LEFT (flipping to wrap toward object)
        ctx.moveTo(centerX, 50); ctx.lineTo(centerX - 15, 65);
        ctx.moveTo(centerX, 350); ctx.lineTo(centerX - 15, 335);
    }
    ctx.stroke();

    const fPos = isDiverging ? centerX + absF*scale : centerX - absF*scale;
    const cPos = isDiverging ? centerX + 2*absF*scale : centerX - 2*absF*scale;
    
    drawPoint(fPos, "F");
    drawPoint(cPos, "C");

    drawArrow(pxS, centerY, ho * scale, 'black');

    if (!isInfinite) {
        const isVirtual = q < 0;
        drawMirrorRays(pxS, pyS, qxS, qyS, fPos, isVirtual);
        drawArrow(qxS, centerY, hi * scale, isVirtual ? '#f1c40f' : 'blue');
    }
}

function drawPoint(x, label) {
    ctx.fillStyle = "black";
    ctx.beginPath(); ctx.arc(x, centerY, 3, 0, Math.PI*2); ctx.fill();
    ctx.font = "italic 12px serif";
    ctx.textAlign = "center";
    ctx.fillText(label, x, centerY + 20);
}

function drawMirrorRays(pxS, pyS, qxS, qyS, fPos, isVirtual) {
    ctx.lineWidth = 1.2;
    // Red: Parallel to Mirror, reflect thru/from F
    ctx.strokeStyle = 'red';
    ctx.beginPath(); ctx.moveTo(pxS, pyS); ctx.lineTo(centerX, pyS);
    let rSlope = (pyS - centerY) / (centerX - fPos);
    ctx.lineTo(0, pyS + (0 - centerX) * rSlope); ctx.stroke();

    // Blue: To Vertex, reflect equal angle
    ctx.strokeStyle = 'blue';
    ctx.beginPath(); ctx.moveTo(pxS, pyS); ctx.lineTo(centerX, centerY);
    let bSlope = (centerY - pyS) / (centerX - pxS);
    ctx.lineTo(0, centerY + (0 - centerX) * bSlope); ctx.stroke();

    // Green: Toward F, reflect Parallel
    ctx.strokeStyle = 'green';
    ctx.beginPath(); ctx.moveTo(pxS, pyS); ctx.lineTo(centerX, qyS); ctx.lineTo(0, qyS); ctx.stroke();

    if (isVirtual) {
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.moveTo(centerX, pyS); ctx.lineTo(qxS, qyS);
        ctx.moveTo(centerX, centerY); ctx.lineTo(qxS, qyS);
        ctx.moveTo(centerX, qyS); ctx.lineTo(qxS, qyS);
        ctx.stroke(); ctx.setLineDash([]);
    }
}

function drawArrow(x, y, h, color) {
    if (isNaN(x) || Math.abs(x) > 2000) return;
    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y - h); ctx.stroke();
    const head = 10; const dir = h > 0 ? 1 : -1;
    ctx.beginPath(); ctx.moveTo(x-6, y-h+head*dir); ctx.lineTo(x, y-h); ctx.lineTo(x+6, y-h+head*dir); ctx.fill();
}

document.querySelectorAll('input').forEach(input => input.addEventListener('input', update));
update();
</script>
</body>
</html>
