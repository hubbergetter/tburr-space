<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projectile Motion App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <div class="app-container">

      <!-- LEFT: Simulation area -->
      <section class="sim-panel">
        <div class="top-bar">
          <div class="time-box">
            <div class="time-label">Elapsed Time</div>
            <div id="timeDisplay" class="time-value">0.000 s</div>
          </div>

          <div class="stats-box">
            <div class="stats-title">Projectile Data</div>
            <div class="stats-grid">
              <div>v<sub>x</sub>:</div>
              <div id="vxDisplay">0.00 m/s</div>

              <div>v<sub>y</sub>:</div>
              <div id="vyDisplay">0.00 m/s</div>

              <div>Speed:</div>
              <div id="speedDisplay">0.00 m/s</div>

              <div>Angle:</div>
              <div id="angleDisplay">0.0°</div>

              <div>Max height:</div>
              <div id="maxHeightDisplay">0.00 m</div>

              <div>Range:</div>
              <div id="rangeDisplay">0.00 m</div>

              <div>Total time:</div>
              <div id="totalTimeDisplay">0.00 s</div>
            </div>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="simCanvas" width="920" height="560"></canvas>
        </div>
      </section>

      <!-- RIGHT: Controls -->
      <aside class="control-panel">
        <h2>Controls</h2>

        <div class="sticky-controls">
          <button id="resetBtn" class="btn btn-reset">Reset</button>
          <button id="toggleBtn" class="btn btn-toggle">Start</button>

          <label class="check-row">
            <input type="checkbox" id="slowMotion" />
            Slow motion
          </label>

          <div class="input-group">
            <label for="heightInput">Initial height</label>
            <div class="input-row">
              <input type="number" id="heightInput" step="0.1" value="5.0" />
              <span>m</span>
            </div>
          </div>

          <div class="input-group">
            <label for="speedInput">Initial speed</label>
            <div class="input-row">
              <input type="number" id="speedInput" step="0.1" value="5.0" />
              <span>m/s</span>
            </div>
          </div>

          <div class="input-group">
            <label for="angleInput">Launch angle</label>
            <div class="input-row">
              <input type="number" id="angleInput" step="0.1" value="45.0" />
              <span>°</span>
            </div>
          </div>

          <div class="input-group">
            <label for="massInput">Mass</label>
            <div class="input-row">
              <input type="number" id="massInput" step="0.1" value="1.0" />
              <span>kg</span>
            </div>
          </div>

          <div class="input-group">
            <label for="gravityInput">Gravitational acceleration</label>
            <div class="input-row">
              <input type="number" id="gravityInput" step="0.01" value="9.81" />
              <span>m/s²</span>
            </div>
          </div>

          <fieldset class="mode-group">
            <legend>Display mode</legend>

            <label><input type="radio" name="displayMode" value="position" /> Position</label>
            <label><input type="radio" name="displayMode" value="velocity" checked /> Velocity</label>
            <label><input type="radio" name="displayMode" value="acceleration" /> Acceleration</label>
            <label><input type="radio" name="displayMode" value="force" /> Force</label>
            <label><input type="radio" name="displayMode" value="energy" /> Energy</label>
          </fieldset>
        </div>
      </aside>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
